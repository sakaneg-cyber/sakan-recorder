name: Build APK
on:
  workflow_dispatch:
  push:
    branches: [ main ]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unzip project
        run: unzip -o sales-sakan-project.zip -d project
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK packages
        run: yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'
      - name: Build APK
        run: cd project && gradle assembleDebug --no-daemon --stacktrace
      - name: Rename APK
        run: cp project/app/build/outputs/apk/debug/app-debug.apk Sales-Sakan.apk
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1
          name: Sales Sakan
          files: Sales-Sakan.apk
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sales-Sakan-APK
          path: Sales-Sakan.apk
